<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" fill="none">
  <defs>
    <radialGradient id="calGlow" cx="260" cy="390" r="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F4621F" stop-opacity="0.11"/>
      <stop offset="60%"  stop-color="#F4621F" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#F4621F" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Soft warm glow behind calendar -->
  <ellipse cx="260" cy="390" rx="440" ry="400" fill="url(#calGlow)"/>

  <!-- ── Calendar (background, low opacity) ──────── -->
  <g opacity="0.28" transform="translate(30, 160)">
    <!-- Card shadow -->
    <rect x="4" y="5" width="460" height="435" rx="12" fill="rgba(44,31,20,0.07)"/>
    <!-- Card bg -->
    <rect width="460" height="435" rx="12" fill="rgba(255,255,255,0.86)" stroke="#D9CCBE" stroke-width="1.5"/>
    <!-- Header bar -->
    <rect width="460" height="50" rx="12" fill="#F4621F" opacity="0.70"/>
    <rect y="40" width="460" height="10" fill="#F4621F" opacity="0.70"/>
    <!-- Month label -->
    <rect x="140" y="16" width="180" height="10" rx="5" fill="rgba(255,255,255,0.45)"/>
    <!-- Day headers (placeholder bars for M T W T F S S) -->
    <rect x="16"  y="58" width="56" height="6" rx="3" fill="rgba(196,181,165,0.55)"/>
    <rect x="78"  y="58" width="56" height="6" rx="3" fill="rgba(196,181,165,0.55)"/>
    <rect x="140" y="58" width="56" height="6" rx="3" fill="rgba(196,181,165,0.55)"/>
    <rect x="202" y="58" width="56" height="6" rx="3" fill="rgba(196,181,165,0.55)"/>
    <rect x="264" y="58" width="56" height="6" rx="3" fill="rgba(196,181,165,0.55)"/>
    <rect x="326" y="58" width="56" height="6" rx="3" fill="rgba(244,98,31,0.38)"/>
    <rect x="388" y="58" width="56" height="6" rx="3" fill="rgba(244,98,31,0.38)"/>

    <!-- Row 1 y=72 -->
    <rect x="16"  y="72" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>
    <rect x="78"  y="72" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>
    <rect x="140" y="72" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>
    <rect x="202" y="72" width="56" height="52" rx="6" fill="#F4621F" opacity="0.46"/>
    <rect x="264" y="72" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>
    <rect x="326" y="72" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>
    <rect x="388" y="72" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>

    <!-- Row 2 y=130 (circled date cell omitted — drawn separately at higher opacity) -->
    <rect x="16"  y="130" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>
    <rect x="78"  y="130" width="56" height="52" rx="6" fill="#F4621F" opacity="0.40"/>
    <rect x="140" y="130" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>
    <rect x="202" y="130" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>
    <rect x="264" y="130" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>
    <!-- x=326 col 6 is the circled date — skipped here -->
    <rect x="388" y="130" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>

    <!-- Row 3 y=188 -->
    <rect x="16"  y="188" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>
    <rect x="78"  y="188" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>
    <rect x="140" y="188" width="56" height="52" rx="6" fill="#F4621F" opacity="0.50"/>
    <rect x="202" y="188" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>
    <rect x="264" y="188" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>
    <rect x="326" y="188" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>
    <rect x="388" y="188" width="56" height="52" rx="6" fill="#F4621F" opacity="0.40"/>

    <!-- Row 4 y=246 -->
    <rect x="16"  y="246" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>
    <rect x="78"  y="246" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>
    <rect x="140" y="246" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>
    <rect x="202" y="246" width="56" height="52" rx="6" fill="#F4621F" opacity="0.44"/>
    <rect x="264" y="246" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>
    <rect x="326" y="246" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>
    <rect x="388" y="246" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>

    <!-- Row 5 y=304 -->
    <rect x="16"  y="304" width="56" height="52" rx="6" fill="#F4621F" opacity="0.38"/>
    <rect x="78"  y="304" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>
    <rect x="140" y="304" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>
    <rect x="202" y="304" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>
    <rect x="264" y="304" width="56" height="52" rx="6" fill="#F4621F" opacity="0.43"/>
    <rect x="326" y="304" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>
    <rect x="388" y="304" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>

    <!-- Row 6 y=362 -->
    <rect x="16"  y="362" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>
    <rect x="78"  y="362" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>
    <rect x="140" y="362" width="56" height="52" rx="6" fill="#F4621F" opacity="0.41"/>
    <rect x="202" y="362" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>
    <rect x="264" y="362" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>
    <rect x="326" y="362" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>
    <rect x="388" y="362" width="56" height="52" rx="6" fill="rgba(244,98,31,0.09)"/>
  </g>

  <!-- ── Circled departure date (higher opacity, drawn outside calendar group) -->
  <!-- Cell local (326, 130) → world (356, 290). Cell size 56×52. Center (384, 316) -->
  <g transform="translate(30, 160)" opacity="0.58">
    <!-- Filled cell -->
    <rect x="326" y="130" width="56" height="52" rx="6" fill="#F4621F" opacity="0.60"/>
    <!-- Circle ring around it -->
    <ellipse cx="354" cy="156" rx="36" ry="33"
             stroke="#F4621F" stroke-width="2.5" fill="none"/>
  </g>

  <!-- ── Dotted flight trail ─────────────────────── -->
  <!-- Starts from right edge of circle: world (30+354+36, 160+156) = (420, 316) -->
  <path d="M420,316 C590,235 1065,572 1318,452"
        stroke="#F4621F" stroke-width="2.5"
        stroke-dasharray="8 11"
        stroke-linecap="round"
        fill="none" opacity="0.50"/>

  <!-- ── Paper plane ─────────────────────────────── -->
  <g transform="translate(1318, 420) rotate(-22) scale(2.8)" opacity="0.76">
    <path d="M2 18L22 9L2 0V7L17 9L2 11V18Z" fill="#F4621F"/>
  </g>

</svg>
